<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=1024">
        <meta name="title" content="SGD Level List">
        <meta proprety="og:url" content="https://sgdlist.pages.dev/">
        <meta property="og:title" content="SGD Level List">
        <meta property="og:description" content="This is a website for the hardest Scratch Geometry Dash levels verified on video!">
        <meta name="keywords" content="scratch, geometry dash, wiki, ddl, yes i am stealing all the tags, demonlist, dao, sgd, scratch tidal wave, zoink, top 1, scratch top 1, squeeg, um yea, we need views somehow, if you are reading this, ballgoballing, was responsible for this, um yea, views, geometry dash, gd, level, levels, demon, hardest, levels, video, list">
        <meta property="og:image" content="https://sgdlist.pages.dev/cat_icon.png">
        <meta name="msapplication-TileColor" content="#000000">
        <meta name="theme-color" content="#000000">
        <title>Piss French Toast Demon List</title>

        <!-- Replace your server icon by uploading an image file named "list_icon.png"-->
        <link rel="icon" href="/cat_icon.png">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
        <link rel="stylesheet" type="text/css" href="/css/reset.css" />
        <link rel="stylesheet" type="text/css" href="/css/typography.css" />
        <link rel="stylesheet" type="text/css" href="/css/main.css" />
        <link rel="stylesheet" type="text/css" href="/css/pages/list.css" />
        <link
            rel="stylesheet"
            type="text/css"
            href="/css/pages/leaderboard.css"
        />
        <link rel="stylesheet" type="text/css" href="/css/pages/roulette.css" />
        <link rel="stylesheet" type="text/css" href="/css/pages/changelog.css" />
        <link rel="stylesheet" type="text/css" href="/css/components/nav.css" />
        <link rel="stylesheet" type="text/css" href="/css/components/btn.css" />
        <link
            rel="stylesheet"
            type="text/css"
            href="/css/components/tabs.css"
        />
        <script src="https://unpkg.com/vue@3.2.31/dist/vue.global.js"></script>
        <script src="https://unpkg.com/vue-router@4.0.14/dist/vue-router.global.prod.js"></script>
        <script type="module" src="/js/main.js"></script>
        <link
          rel="stylesheet"
          href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css"
        />     
        <script
        src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.js">
        </script>
    </head>
    <style id="customCSS">* {}</style>
    <body id="app">
        <header :class="{ dark: store.dark, 'darker': store.darker }">
			<div class="logo" style="display: flex; align-items: center; gap: 12px; border: 0;">
				<a href="https://sgdlist.pages.dev/">
                <img :src="store.darkSet ? '../cat_icon.png' : '../cat_icon_light.png'" alt="The Piss French Toast Demon List Logo" style="height: 50px; border-radius: 10%;" href="https://sgdlist.pages.dev/">
                </a>
    			<h2 style="margin: 0; white-space: nowrap; font-weight: 550;">Piss French Toast Demon List</h2>
			</div>
            <nav class="nav">
                <router-link class="nav__tab" to="/">
                    <span class="type-label-lg" style="white-space: nowrap;">Demon List</span>
                </router-link>
                <router-link class="nav__tab" to="/leaderboard">
                    <span class="type-label-lg">Leaderboard</span>
                </router-link>
                <router-link class="nav__tab" to="/roulette">
                    <span class="type-label-lg">Roulette</span>
                </router-link>                
				<router-link class="nav__tab" to="/packs">
                    <span class="type-label-lg">Packs</span>
                </router-link>    
                <router-link class="nav__tab" to="/statistics">
                    <span class="type-label-lg">Statistics</span>
                </router-link>        
                <div class="nav__actions">
                    <button
                        class="nav__icon"
                        @click.prevent="store.toggleDark()"
                    >
                        <img
                            :src="store.darkSet ? '/assets/light.svg' : '/assets/dark.svg'"
                            alt=""
							style="filter: var(--the-button-on-top)"
                        />
                    </button>
					<button
                        class="nav__icon"
                        @click.prevent="store.showSettings()"
                    >
                        <img
                            src="../assets/settings.svg"
                            alt=""
							style="filter: var(--the-button-on-top)"
                        />
                    </button>
                    <!-- Replace the '#' with your discord server's invite-->
                    <a class="nav__icon" href="https://discord.gg/FkKeS9kvT4" target="_blank">
                        <img src="/assets/discord.svg" alt="Discord Logo" style="filter: var(--the-button-on-top)" />
                    </a>
                    <!-- List record submission form, add a link to replace the '#' when putting a link to your list submission form-->
                    <a
                        class="nav__cta type-label-lg"
                        href="https://sgdlist.pages.dev/submissions"
                        target="_blank"
						style="white-space: nowrap;"
                        >Submit Record</a
                    >
                </div>
            </nav>
        </header>
        <router-view :class="{ dark: store.dark, 'darker': store.darker, 'custom': store.custom }"></router-view>
        <div id="settingsPanel" style="display: none;">
            
            <!-- <input type="checkbox" id="checkbox" v-model="checked" />
            <label for="checkbox">{{ checked }}</label> -->
            <div style="justify-content: left; align-items: left; margin: 1em; padding: 1em; display: grid; gap: 1em;">
                <p style="color: white;">Background Color: </p> 
                <input type="color" id="bgColor" v-model="bgColor" placeholder="#......" />
                <p style="color: white;">Text Color: </p>
                <input type="color" id="textColor" v-model="textColor" placeholder="#......" />
                <p style="color: white;">Primary Color: </p>
                <input type="color" id="primaryColor" v-model="primaryColor" placeholder="#......" />
                <p style="color: white;">On Primary Color: </p>
                <input type="color" id="onPrimaryColor" v-model="onPrimaryColor" placeholder="#......" />
                <p style="color: white;">Color Theme: </p>  
                <select name="theme" id="theme">
                    <option value="" selected>Light</option>
                    <option value="true">Dark</option>
                </select>
                <p style="color: white;">Custom CSS (If you sux, don't change this (oh also you might get hacked if you copy some random css))</p>
                <textarea id="inputCustomCSS" v-model="inputCustomCSS" placeholder="Input Custom CSS here..."></textarea>
                <p style="color: white;">Debug Mode: </p>
                <input id="debugMode" v-model="debugMode" type="checkbox" />
                <button class="btn" @click.prevent="store.applyColor()">good enough</button>
                <button class="btn" @click.prevent="store.resetColor()">reset stuff</button>
            </div>
        </div>
    </body>
</html>
