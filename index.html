    <body id="app">
        <header :class="[store.theme, store.color]" style="overflow: auto;">
			<div class="logo" style="display: flex; align-items: center; gap: 12px; border: 0;">
				<a href="https://sgdlist.pages.dev/">

                </router-link>

                        <img src="/assets/discord.svg" alt="Discord Logo" style="filter: var(--the-button-on-top)" />
                    </a>
                    <!-- List record submission form, add a link to replace the '#' when putting a link to your list submission form-->
                    <a
                        class="nav__cta type-label-lg"
                        href="https://sgdlist.pages.dev/submissions"
                        target="_blank"
						style="white-space: nowrap; font-weight: 700;"
